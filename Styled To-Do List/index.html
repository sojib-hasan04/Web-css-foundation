<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container">
    <h1>My To-Do List</h1>
    <ul class="todo-list">
        <li>
            <input type="checkbox" id="task-1">
            <label for="task-1">Explore gaming keyboards</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://google.com" target="_blank">Store link</a></li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="task-2">
            <label for="task-2">Finish the report</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://google.com" target="_blank">Request Access</a></li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="task-3">
            <label for="task-3">View phone's Warranty</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://google.com" target="_blank">View Receipts</a></li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="task-4">
            <label for="task-4">Start a new game</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" href="https://google.com" target="_blank">Play Now</a></li>
            </ul>
        </li>
    </ul>
</div>
</body>
</html>
</body>

</html>
